site_name: Jeffrey 知识库
site_description: Jeffrey 的个人知识库
site_author: Jeffrey
site_url: http://127.0.0.1:3164
repo_url: https://github.com/yiyezhangmu/agentdoc
repo_name: yiyezhangmu/agentdoc
edit_uri: edit/main/docs/

dev_addr: 127.0.0.1:3164

exclude_docs: |
  巡店/巡店AI/

extra_css:
  - assets/stylesheets/custom.css

extra_javascript:
  - assets/javascripts/sidebar-toggle.js
  - assets/javascripts/content-enhancements.js
  - assets/javascripts/mermaid-renderer.js

theme:
  name: material
  language: zh
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.expand
    - navigation.drawer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.select
    - content.action.edit
    - header.autohide
    - announce.dismiss
    - navigation.instant
    - toc.follow
    - toc.sticky
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: cyan
      accent: teal
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: cyan
      accent: teal
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式
  font: false
  custom_dir: overrides

plugins:
  - privacy
  - search:
      lang:
        - zh
        - en

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid-source
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.magiclink

nav:
  - 首页: index.md
  - AI 与 Agent:
      - 概览: ai-agent/index.md
      - Agent 工程: ai-agent/agent-engineering/index.md
      - OpenAI:
          - Chat Completions、Responses 与 Agents SDK:
              - 接口与 Agents SDK 总览: ai-agent/openai/chat-completions-responses-agents/index.md
              - 丰富版 HTML: ai-agent/openai/chat-completions-responses-agents/openai_api_team_sharing.html
  - 架构设计: architecture/index.md
  - 巡店:
      - 概览: 巡店/index.md
      - 好多店 Agent:
          - 文档包概览: 巡店/好多店AGENT/README.md
          - 需求:
              - 产品需求: 巡店/好多店AGENT/docs/需求-01-产品需求.md
              - AI 岗位与领域模型: 巡店/好多店AGENT/docs/需求-02-AI岗位与领域模型.md
          - 技术:
              - 总体设计: 巡店/好多店AGENT/docs/技术-01-总体设计.md
              - Agent Service: 巡店/好多店AGENT/docs/技术-02-Agent-Service设计.md
              - Skill 体系: 巡店/好多店AGENT/docs/技术-03-Skill体系设计.md
              - Workflow 流程: 巡店/好多店AGENT/docs/技术-04-Workflow流程设计.md
              - Tool 与 Gateway: 巡店/好多店AGENT/docs/技术-05-Tool与Gateway设计.md
              - 业务系统对接: 巡店/好多店AGENT/docs/技术-06-业务系统对接.md
          - 测试:
              - 系统验收计划: 巡店/好多店AGENT/docs/测试-01-系统验收计划.md
              - AI 检查项规则验证: 巡店/好多店AGENT/docs/测试-02-AI检查项规则验证.md
          - 参考:
              - AI 巡店代码与数据分析: 巡店/好多店AGENT/docs/参考-01-AI巡店代码与数据分析.md
  - 其他:
      - 概览: miscellaneous/index.md
      - 数据库: database/index.md
      - DevOps: devops/index.md
  - 本地目录: file:///D:/dev/docs-jeffrey/docs/
